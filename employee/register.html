<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Add Employee Personal Details</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:Arial,sans-serif;
}

body{
  background:#f4f8ff;
  padding:30px;
}

.container{
  max-width:850px;
  margin:auto;
}

.header{
  background:linear-gradient(135deg,#2563eb,#0f172a);
  color:white;
  padding:30px;
  border-radius:25px;
  margin-bottom:25px;
}

.header h1{
  font-size:34px;
}

.header p{
  margin-top:10px;
  opacity:.85;
}

.form-box{
  background:white;
  padding:30px;
  border-radius:25px;
  box-shadow:0 20px 50px rgba(0,0,0,.08);
}

.grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:20px;
}

.input-group{
  margin-bottom:20px;
}

label{
  display:block;
  font-weight:700;
  margin-bottom:10px;
}

input,
select,
textarea{
  width:100%;
  padding:15px;
  border-radius:14px;
  border:1px solid #d1d5db;
  font-size:16px;
  outline:none;
}

input:focus,
select:focus,
textarea:focus{
  border-color:#2563eb;
  box-shadow:0 0 0 4px rgba(37,99,235,.12);
}

textarea{
  resize:none;
  height:100px;
}

.full{
  grid-column:1 / -1;
}

.btn{
  width:100%;
  padding:18px;
  border:none;
  border-radius:18px;
  background:#2563eb;
  color:white;
  font-size:18px;
  font-weight:700;
  cursor:pointer;
}

.btn:hover{
  background:#1d4ed8;
}

.success{
  display:none;
  margin-top:20px;
  padding:16px;
  background:#dcfce7;
  color:#166534;
  border-radius:14px;
  font-weight:700;
}

@media(max-width:700px){
  body{
    padding:18px;
  }

  .grid{
    grid-template-columns:1fr;
  }

  .header h1{
    font-size:27px;
  }
}
</style>
</head>

<body>

<div class="container">

  <div class="header">
    <h1><i class="fa-solid fa-user-plus"></i> Add Employee</h1>
    <p>Save employee personal details for login and attendance system.</p>
  </div>

  <div class="form-box">

    <form id="employeeForm">

      <div class="grid">

        <div class="input-group">
          <label>Full Name</label>
          <input type="text" id="fullName" placeholder="Enter full name" required>
        </div>

        <div class="input-group">
          <label>Phone Number</label>
          <input type="tel" id="phone" maxlength="10" placeholder="Enter phone number" required>
        </div>

        <div class="input-group">
          <label>Create 6 Digit PIN</label>
          <input type="password" id="pin" maxlength="6" placeholder="Enter 6 digit PIN" required>
        </div>

        <div class="input-group">
          <label>Email</label>
          <input type="email" id="email" placeholder="Enter email address">
        </div>

        <div class="input-group">
          <label>Date of Birth</label>
          <input type="date" id="dob">
        </div>

        <div class="input-group">
          <label>Gender</label>
          <select id="gender">
            <option value="">Select Gender</option>
            <option>Male</option>
            <option>Female</option>
            <option>Other</option>
          </select>
        </div>

        <div class="input-group full">
          <label>Address</label>
          <textarea id="address" placeholder="Enter address"></textarea>
        </div>

      </div>

      <button type="submit" class="btn">
        <i class="fa-solid fa-floppy-disk"></i> Save Details
      </button>

      <div class="success" id="successMsg">
        Employee personal details saved successfully.
      </div>

    </form>

  </div>

</div>

<script src="../google-sheet.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@fingerprintjs/fingerprintjs@4/dist/fp.min.js"></script>

<script>
let userPublicIP = "";
let fingerprintId = "";

async function getPublicIP(){
  try{
    const res = await fetch("https://api.ipify.org?format=json");
    const data = await res.json();
    userPublicIP = data.ip;
  }catch(error){
    userPublicIP = "IP_NOT_FOUND";
  }
}

function getBackupDeviceId(){
  let id = localStorage.getItem("backupDeviceId");

  if(!id){
    id = "DEV-" + crypto.randomUUID();
    localStorage.setItem("backupDeviceId", id);
  }

  return id;
}

async function getFingerprint(){
  try{
    if(typeof FingerprintJS !== "undefined"){
      const fp = await FingerprintJS.load();
      const result = await fp.get();
      fingerprintId = result.visitorId;
    }else{
      fingerprintId = getBackupDeviceId();
    }
  }catch(error){
    fingerprintId = getBackupDeviceId();
  }
}

document.getElementById("pin").addEventListener("input", function(){
  this.value = this.value.replace(/[^0-9]/g,"").slice(0,6);
});

document.getElementById("phone").addEventListener("input", function(){
  this.value = this.value.replace(/[^0-9]/g,"").slice(0,10);
});

document.getElementById("employeeForm").addEventListener("submit", async function(e){
  e.preventDefault();

  const fullName = document.getElementById("fullName").value.trim();
  const phone = document.getElementById("phone").value.trim();
  const pin = document.getElementById("pin").value.trim();

  if(fullName === ""){
    alert("Please enter full name");
    return;
  }

  if(!/^[0-9]{10}$/.test(phone)){
    alert("Please enter valid 10 digit phone number");
    return;
  }

  if(!/^[0-9]{6}$/.test(pin)){
    alert("Please enter valid 6 digit PIN");
    return;
  }

  const btn = document.querySelector(".btn");
  btn.disabled = true;
  btn.innerHTML = "Saving...";

  await getPublicIP();
  await getFingerprint();

  const employeeId = "EMP" + Date.now().toString().slice(-6);

  const employee = {
    action: "addEmployee",
    employeeId: employeeId,
    fullName: fullName,
    phone: phone,
    pin: pin,
    email: document.getElementById("email").value.trim(),
    dob: document.getElementById("dob").value,
    gender: document.getElementById("gender").value,
    address: document.getElementById("address").value.trim(),
    department: "",
    designation: "",
    joiningDate: "",
    salary: "",
    shift: "",
    status: "Inactive",
    registeredIpAddress: userPublicIP,
    registeredFingerprintId: fingerprintId
  };

  try{
    const result = await saveToGoogleSheet(employee);

    if(result.success){
      document.getElementById("successMsg").style.display = "block";
      document.getElementById("employeeForm").reset();

      setTimeout(() => {
       window.location.href = "../index.html";
      }, 1200);

    }else{
      alert(result.message || "Employee details not saved");
    }

  }catch(error){
    alert("Google Sheet save failed");
    console.log(error);
  }

  btn.disabled = false;
  btn.innerHTML = `<i class="fa-solid fa-floppy-disk"></i> Save Details`;
});
</script>

</body>
</html>
